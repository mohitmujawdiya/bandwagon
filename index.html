<!DOCTYPE html>
<!--
  Active theme is set on the <html> element below. The default theme block
  (in src/styles.css @theme) has been retuned to Bandwagon ("The Terrace
  Cinema"); the other presets in src/themes.css remain available but unused.
-->
<html lang="en" data-theme="slate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Stadium type system (all OFL / commercial-safe). Display: Anton
         (towering condensed) is self-hosted in /public/fonts (see styles.css)
         so it embeds into the passport image export. Body: Hanken Grotesk.
         Data: Martian Mono. Those two stay on the Google CDN for now. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Martian+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>Bandwagon — Find your World Cup team</title>
    <meta
      name="description"
      content="Adopt a nation for the 2026 World Cup in 60 seconds and get a Supporter Passport worth posting."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
